# ─────────────────────────────────────────────────────
# Secrets Chart — External Secrets Operator
# Syncs secrets from Vault/AWS SM/GCP SM into K8s
# Multi-tenant: per-namespace SecretStores
# ─────────────────────────────────────────────────────

external-secrets:
  installCRDs: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# ── SECRET STORES ────────────────────────────────────
# Define one or more backends — per-namespace for tenant isolation

secretStores:
  # HashiCorp Vault backend
  vault:
    enabled: false
    server: "https://vault.example.com"
    path: "secret"
    version: "v2"
    auth:
      kubernetes:
        mountPath: "kubernetes"
        role: ""  # Vault role bound to K8s service account

  # AWS Secrets Manager
  aws:
    enabled: false
    region: "me-south-1"
    auth:
      # Use IRSA (recommended)
      serviceAccountRef:
        name: ""

  # GCP Secret Manager
  gcp:
    enabled: false
    projectId: ""
    auth:
      # Use Workload Identity (recommended)
      workloadIdentity:
        serviceAccountRef:
          name: ""

# ── EXTERNAL SECRETS ─────────────────────────────────
# Define which secrets to sync from the backend

externalSecrets: []
