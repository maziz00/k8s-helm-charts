apiVersion: v2
name: observability
description: Prometheus + Grafana + Loki monitoring stack with pre-built dashboards and multi-tenant metrics isolation
type: application
version: 1.0.0
appVersion: "1.0.0"
kubeVersion: ">=1.28.0-0"
dependencies:
  - name: kube-prometheus-stack
    version: "56.x"
    repository: "https://prometheus-community.github.io/helm-charts"
  - name: loki-stack
    version: "2.10.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled
maintainers:
  - name: Mohamed AbdelAziz
    url: https://github.com/maziz00
