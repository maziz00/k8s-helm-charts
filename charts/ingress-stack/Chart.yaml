apiVersion: v2
name: ingress-stack
description: NGINX Ingress + cert-manager + ExternalDNS with per-tenant isolation and rate limiting
type: application
version: 1.0.0
appVersion: "1.0.0"
kubeVersion: ">=1.28.0-0"
dependencies:
  - name: ingress-nginx
    version: "4.9.x"
    repository: "https://kubernetes.github.io/ingress-nginx"
  - name: cert-manager
    version: "1.14.x"
    repository: "https://charts.jetstack.io"
    condition: certManager.enabled
  - name: external-dns
    version: "1.14.x"
    repository: "https://kubernetes-sigs.github.io/external-dns"
    condition: externalDns.enabled
maintainers:
  - name: Mohamed AbdelAziz
    url: https://github.com/maziz00
