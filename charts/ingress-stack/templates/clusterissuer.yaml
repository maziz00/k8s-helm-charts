{{- if .Values.certManager.enabled }}
{{- if .Values.clusterIssuers.letsencryptStaging.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: {{ .Values.clusterIssuers.letsencryptStaging.server }}
    email: {{ .Values.clusterIssuers.letsencryptStaging.email }}
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
{{- end }}
---
{{- if .Values.clusterIssuers.letsencryptProd.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: {{ .Values.clusterIssuers.letsencryptProd.server }}
    email: {{ .Values.clusterIssuers.letsencryptProd.email }}
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
{{- end }}
{{- end }}
