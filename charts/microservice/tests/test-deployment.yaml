apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "microservice.fullname" . }}-test"
  labels:
    {{- include "microservice.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args:
        - '--timeout=5'
        - '--spider'
        - 'http://{{ include "microservice.fullname" . }}:{{ .Values.service.port }}{{ .Values.healthCheck.readiness.path }}'
  restartPolicy: Never
