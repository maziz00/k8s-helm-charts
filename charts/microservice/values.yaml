# ─────────────────────────────────────────────────────
# Microservice Chart — Default Values
# Production-ready with autoscaling & multi-tenant support
# ─────────────────────────────────────────────────────

replicaCount: 2

image:
  repository: registry.gitlab.com/myorg/my-app
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# ── MULTI-TENANT ISOLATION ───────────────────────────
# Each tenant gets its own namespace with resource quotas
# and network policies to prevent noisy-neighbor issues

tenant:
  # Enable multi-tenant mode — creates ResourceQuota + LimitRange
  enabled: false
  name: ""
  # Hard resource quota for the entire namespace
  resourceQuota:
    requests:
      cpu: "4"
      memory: "8Gi"
    limits:
      cpu: "8"
      memory: "16Gi"
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
  # Default limits applied to every pod that doesn't specify its own
  limitRange:
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    max:
      cpu: "2"
      memory: "4Gi"

# ── CONTAINER RESOURCES ──────────────────────────────
# Always set these — unbounded pods kill shared clusters

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── AUTOSCALING ──────────────────────────────────────
# HPA with CPU, memory, and custom metrics support
# For multi-tenant: each service scales within its quota

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 15
  behavior:
    # Scale up fast (emergency), scale down slow (stability)
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100         # Double pods per 30s during spikes
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Percent
          value: 10          # Remove 10% of pods per minute
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  # Custom metrics via Prometheus Adapter (e.g., requests per second)
  customMetrics: []
  # Example:
  # - type: Pods
  #   pods:
  #     metric:
  #       name: http_requests_per_second
  #     target:
  #       type: AverageValue
  #       averageValue: "1000"

# KEDA — event-driven autoscaling (scales to/from zero)
keda:
  enabled: false
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 0
  maxReplicaCount: 20
  triggers: []
  # Example — scale on RabbitMQ queue depth:
  # - type: rabbitmq
  #   metadata:
  #     queueName: orders
  #     queueLength: "5"

# ── POD DISRUPTION BUDGET ────────────────────────────
# Prevents Kubernetes from evicting too many pods at once
# Critical for node upgrades and cluster autoscaler

podDisruptionBudget:
  enabled: true
  minAvailable: "50%"
  # OR use maxUnavailable: 1

# ── HEALTH PROBES ────────────────────────────────────

healthCheck:
  liveness:
    path: /healthz
    port: http
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /ready
    port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3
  startup:
    path: /healthz
    port: http
    initialDelaySeconds: 0
    periodSeconds: 5
    failureThreshold: 30   # 30 * 5s = 2.5 min max startup time

# ── SERVICE ──────────────────────────────────────────

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# ── INGRESS ──────────────────────────────────────────

ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/rate-limit: "100"
    # nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: app-tls
  #    hosts:
  #      - app.example.com

# ── SERVICE ACCOUNT (IRSA / Workload Identity) ──────

serviceAccount:
  create: true
  name: ""
  annotations: {}
    # AWS IRSA:
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-app-role
    # GCP Workload Identity:
    # iam.gke.io/gcp-service-account: my-app@project.iam.gserviceaccount.com

# ── NETWORK POLICY ───────────────────────────────────
# Namespace isolation for multi-tenant clusters

networkPolicy:
  enabled: false
  # Allow ingress only from same namespace + ingress controller
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
  # Allow egress to DNS + same namespace + specific CIDRs
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector: {}

# ── PROMETHEUS MONITORING ────────────────────────────

serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
  port: http

# ── POD CONFIGURATION ───────────────────────────────

env: []
  # - name: DATABASE_URL
  #   valueFrom:
  #     secretKeyRef:
  #       name: app-secrets
  #       key: database-url

envFrom: []
  # - configMapRef:
  #     name: app-config
  # - secretRef:
  #     name: app-secrets

volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}
  # Pod anti-affinity — spread across nodes for HA
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #     - weight: 100
  #       podAffinityTerm:
  #         labelSelector:
  #           matchExpressions:
  #             - key: app.kubernetes.io/name
  #               operator: In
  #               values: ["my-app"]
  #         topologyKey: kubernetes.io/hostname

# Topology spread — evenly distribute across zones
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: my-app

# ── DEPLOYMENT STRATEGY ──────────────────────────────

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: "25%"
    maxUnavailable: 0   # Zero-downtime deploys
