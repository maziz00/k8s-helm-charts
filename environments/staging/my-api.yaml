# ─────────────────────────────────────────────────────
# Staging — my-api
# Minimal resources, single replica, debug-friendly
# ─────────────────────────────────────────────────────

replicaCount: 1

image:
  repository: registry.gitlab.com/myorg/my-api
  tag: "latest"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# Autoscaling OFF in staging — save resources
autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

# Multi-tenant: staging tenant gets limited quota
tenant:
  enabled: true
  name: staging
  resourceQuota:
    requests:
      cpu: "2"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
    pods: "10"
    services: "5"
    persistentvolumeclaims: "3"
  limitRange:
    default:
      cpu: "250m"
      memory: "256Mi"
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
    max:
      cpu: "1"
      memory: "2Gi"

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true
  interval: 60s

env:
  - name: LOG_LEVEL
    value: "debug"
  - name: ENVIRONMENT
    value: "staging"
